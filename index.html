<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리집 가계부 V8</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --surface-light: #2c2c2c;
            --text-primary: #e0e0e0;
            --text-secondary: #9e9e9e;
            --accent-color: #4db8ff;
            --danger-color: #ff6b6b;
            --border-color: #383838;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 창 크기 조절이 가능한 메인 윈도우 */
        .app-window {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            width: 95vw;
            max-width: 850px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            resize: both; 
        }

        /* 암호 잠금 화면 (0509) */
        #login-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--surface-color);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .menu-bar {
            display: flex;
            background-color: var(--surface-light);
            padding: 5px 10px;
            border-bottom: 1px solid var(--border-color);
            gap: 5px;
            overflow-x: auto;
            scrollbar-width: none; 
        }
        .menu-bar::-webkit-scrollbar { display: none; }

        .menu-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .menu-btn.active {
            color: #fff;
            background-color: var(--accent-color);
        }

        .content-area {
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .month-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            background: var(--surface-light);
            padding: 10px;
            border-radius: 8px;
        }

        .summary-card {
            background-color: var(--surface-light);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .amount-val { font-weight: bold; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 5px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-secondary); font-weight: normal; }

        .progress-track { background: var(--bg-color); height: 6px; border-radius: 3px; margin-top: 6px; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
        input, select {
            width: 100%;
            background: var(--bg-color);
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }

        .action-btn {
            padding: 4px 8px;
            border-radius: 4px;
            border: none;
            font-size: 11px;
            cursor: pointer;
            color: white;
            margin-right: 3px;
        }
        .edit-btn { background-color: var(--accent-color); }
        .del-btn { background-color: var(--danger-color); }

        .admin-col { display: none; }
        .edit-mode-active .admin-col { display: table-cell; }

        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface-light);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        @media (max-width: 480px) {
            .app-window { width: 100vw; height: 100vh; border-radius: 0; }
            th, td { padding: 10px 4px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="app-window">
    <div id="login-screen">
        <h2 style="margin-bottom: 10px;">🔒 우리집 가계부</h2>
        <p style="color:var(--text-secondary); margin-bottom: 20px;">비밀번호 4자리를 입력하세요 (0509)</p>
        <input type="password" id="pwd-input" inputmode="numeric" pattern="[0-9]*" placeholder="Pass" style="width:140px; text-align:center; font-size:24px; letter-spacing:8px;" onkeydown="if(event.key === 'Enter') checkLogin()">
        <button class="submit-btn" style="width:140px; margin-top:20px;" onclick="checkLogin()">입장하기</button>
    </div>

    <div class="menu-bar">
        <button class="menu-btn active" id="btn-dashboard" onclick="switchTab('dashboard', this)">현황</button>
        <button class="menu-btn" id="btn-expense" onclick="switchTab('expense-add', this)">지출등록</button>
        <button class="menu-btn" id="btn-history" onclick="switchTab('history', this)">내역</button>
        <button class="menu-btn" id="btn-settings" onclick="switchTab('settings', this)">설정</button>
    </div>

    <div class="content-area">
        <div class="month-selector" id="month-nav">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;">◀</button>
            <strong id="display-month">2026-05</strong>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:white; cursor:pointer;">▶</button>
        </div>

        <div id="dashboard" class="tab-content active">
            <div class="summary-card">
                <div class="summary-row"><span>예산 총액</span><span id="stat-total-budget" class="amount-val">0원</span></div>
                <div class="summary-row"><span>총 지출</span><span id="stat-expense" class="amount-val" style="color:var(--danger-color)">0원</span></div>
                <hr style="border:0; border-top:1px solid var(--border-color); margin:10px 0;">
                <div class="summary-row"><span>남은 예산</span><strong id="stat-remain" class="amount-val" style="font-size:1.1em;">0원</strong></div>
            </div>
            <table id="budget-table">
                <thead><tr><th>항목</th><th>사용/예산</th><th>잔액</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="expense-add" class="tab-content">
            <h3 id="form-title">지출 기록</h3>
            <input type="hidden" id="edit-id">
            <div class="form-group"><label>날짜</label><input type="date" id="exp-date"></div>
            <div class="form-group"><label>항목</label><select id="exp-category"></select></div>
            <div class="form-group"><label>내용</label><input type="text" id="exp-note" placeholder="어디서 썼나요?"></div>
            <div class="form-group">
                <label>금액</label>
                <input type="text" id="exp-amount" inputmode="numeric" placeholder="0" oninput="inputFormatting(this)">
            </div>
            <button class="submit-btn" id="save-btn" onclick="saveTransaction()">지출 저장</button>
            <button class="submit-btn" id="cancel-btn" style="background:#555; display:none; margin-top:10px;" onclick="cancelEdit()">수정 취소</button>
        </div>

        <div id="history" class="tab-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <h3>월간 내역</h3>
                    <button id="toggle-edit-btn" onclick="toggleEditMode()" style="background:#444; color:var(--accent-color); border:1px solid var(--accent-color); padding:4px 10px; border-radius:4px; font-size:11px; cursor:pointer;">편집</button>
                </div>
                <div style="display:flex; gap:4px;">
                    <button onclick="document.getElementById('csv-file').click()" style="background:#555; color:white; border:none; padding:6px 8px; border-radius:4px; font-size:10px;">가져오기</button>
                    <input type="file" id="csv-file" accept=".csv" style="display:none;" onchange="importCSV(this)">
                    <button onclick="exportCSV('current')" style="background:#444; color:white; border:none; padding:6px 8px; border-radius:4px; font-size:10px;">월간저장</button>
                    <button onclick="exportCSV('all')" style="background:#4db8ff; color:white; border:none; padding:6px 8px; border-radius:4px; font-size:10px;">전체저장</button>
                </div>
            </div>
            <table id="history-table">
                <thead><tr><th>날짜</th><th>내용/항목</th><th>금액</th><th class="admin-col">관리</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="settings" class="tab-content">
            <h3>지출 항목 및 예산 설정</h3>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <input type="text" id="new-cat-name" placeholder="새 항목 명">
                <button onclick="addCategory()" style="background:var(--accent-color); border:none; padding:10px; border-radius:6px; color:white;">추가</button>
            </div>
            <div id="category-list"></div>
            <button class="submit-btn" onclick="saveCategories()">설정 저장</button>
        </div>
    </div>
</div>

<script>
    /* ----------------------------------------------------
       핵심 시스템 함수 (로그인 및 공통)
    ---------------------------------------------------- */
    function checkLogin() {
        const inputVal = document.getElementById('pwd-input').value.trim(); // 공백 제거 추가
        if(inputVal === '0509') {
            document.getElementById('login-screen').style.display = 'none';
        } else {
            alert('비밀번호가 틀렸습니다.');
            document.getElementById('pwd-input').value = '';
            document.getElementById('pwd-input').focus();
        }
    }

    let isEditMode = false;
    function toggleEditMode() {
        try {
            isEditMode = !isEditMode;
            const table = document.getElementById('history-table');
            const btn = document.getElementById('toggle-edit-btn');
            if(!btn) return;

            if (isEditMode) {
                table.classList.add('edit-mode-active');
                btn.innerText = '완료';
                btn.style.backgroundColor = 'var(--accent-color)';
                btn.style.color = '#fff';
            } else {
                table.classList.remove('edit-mode-active');
                btn.innerText = '편집';
                btn.style.backgroundColor = '#444';
                btn.style.color = 'var(--accent-color)';
            }
        } catch(e) { console.error(e); }
    }

    /* ----------------------------------------------------
       금액 포맷팅 및 데이터 처리
    ---------------------------------------------------- */
    function inputFormatting(el) {
        let value = el.value.replace(/[^0-9]/g, "");
        if(value) el.value = Number(value).toLocaleString();
        else el.value = "";
    }
    const parseFormatted = (str) => parseInt(String(str).replace(/,/g, "")) || 0;
    const format = (n) => Number(n).toLocaleString() + '원';

    /* ----------------------------------------------------
       데이터 로드 및 초기화
    ---------------------------------------------------- */
    let currentDate = new Date();
    const defaultCats = [
        { id: 1, name: '식재료', budget: 1200000 },
        { id: 2, name: '외식', budget: 300000 },
        { id: 3, name: '보험금', budget: 500000 },
        { id: 4, name: '잡화', budget: 400000 },
        { id: 5, name: '예비비', budget: 200000 },
        { id: 6, name: '연료', budget: 150000 },
        { id: 7, name: '엄마활동비', budget: 150000 },
        { id: 8, name: '성준이랑', budget: 100000 }
    ];

    let categories = JSON.parse(localStorage.getItem('g_cats')) || defaultCats;
    let transactions = JSON.parse(localStorage.getItem('g_trans')) || [];

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        document.getElementById('month-nav').style.display = (id === 'expense-add' || id === 'settings') ? 'none' : 'flex';
        
        // 편집 모드 강제 해제
        if(isEditMode) { isEditMode = true; toggleEditMode(); }
        refreshUI();
    }

    function changeMonth(val) {
        currentDate.setMonth(currentDate.getMonth() + val);
        refreshUI();
    }

    function refreshUI() {
        const year = currentDate.getFullYear();
        const month = String(currentDate.getMonth() + 1).padStart(2, '0');
        const monthStr = `${year}-${month}`;
        document.getElementById('display-month').innerText = monthStr;
        updateDashboard(monthStr);
        updateHistory(monthStr);
        renderSettings();
        initCategorySelect();
    }

    function updateDashboard(monthStr) {
        const filtered = transactions.filter(t => t.date.startsWith(monthStr));
        const totalExp = filtered.reduce((a, b) => a + b.amount, 0);
        const totalBudget = categories.reduce((a, b) => a + b.budget, 0);
        document.getElementById('stat-total-budget').innerText = format(totalBudget);
        document.getElementById('stat-expense').innerText = format(totalExp);
        document.getElementById('stat-remain').innerText = format(totalBudget - totalExp);

        const tbody = document.querySelector('#budget-table tbody');
        tbody.innerHTML = '';
        categories.forEach(c => {
            const spent = filtered.filter(t => t.catId === c.id).reduce((a, b) => a + b.amount, 0);
            const remain = c.budget - spent;
            const per = c.budget > 0 ? Math.min((spent/c.budget)*100, 100) : (spent > 0 ? 100 : 0);
            tbody.innerHTML += `<tr>
                <td>${c.name}<div class="progress-track"><div class="progress-fill" style="width:${per}%; background:${spent > c.budget ? 'var(--danger-color)':'var(--accent-color)'}"></div></div></td>
                <td>${format(spent)}<br><small style="color:var(--text-secondary)">/ ${format(c.budget)}</small></td>
                <td style="color:${remain < 0 ? 'var(--danger-color)' : 'inherit'}">${format(remain)}</td>
            </tr>`;
        });
    }

    function updateHistory(monthStr) {
        const filtered = transactions.filter(t => t.date.startsWith(monthStr)).sort((a,b) => new Date(b.date) - new Date(a.date));
        const tbody = document.querySelector('#history-table tbody');
        tbody.innerHTML = filtered.map(t => {
            const cat = categories.find(c => c.id === t.catId);
            return `<tr>
                <td>${t.date.slice(5)}</td>
                <td>${t.note}<br><small style="color:var(--text-secondary)">${cat ? cat.name : '미지정'}</small></td>
                <td style="color:var(--danger-color); font-weight:bold;">-${format(t.amount)}</td>
                <td class="admin-col">
                    <button class="action-btn edit-btn" onclick="startEdit(${t.id})">수정</button>
                    <button class="action-btn del-btn" onclick="deleteTransaction(${t.id})">삭제</button>
                </td>
            </tr>`;
        }).join('');
    }

    function saveTransaction() {
        const id = document.getElementById('edit-id').value;
        const date = document.getElementById('exp-date').value;
        const note = document.getElementById('exp-note').value;
        const amount = parseFormatted(document.getElementById('exp-amount').value);
        const catId = parseInt(document.getElementById('exp-category').value);
        if(!date || amount <= 0) return alert('정확한 데이터를 입력하세요.');
        if(id) {
            const idx = transactions.findIndex(t => t.id == id);
            transactions[idx] = { ...transactions[idx], date, note, amount, catId };
            alert('수정되었습니다.');
        } else {
            transactions.push({ id: Date.now(), date, note, amount, catId });
            alert('저장되었습니다.');
        }
        localStorage.setItem('g_trans', JSON.stringify(transactions));
        cancelEdit();
        refreshUI();
    }

    function startEdit(id) {
        const t = transactions.find(item => item.id == id);
        if(!t) return;
        document.getElementById('edit-id').value = t.id;
        document.getElementById('exp-date').value = t.date;
        document.getElementById('exp-note').value = t.note;
        document.getElementById('exp-amount').value = Number(t.amount).toLocaleString();
        document.getElementById('exp-category').value = t.catId;
        document.getElementById('form-title').innerText = "내역 수정";
        document.getElementById('save-btn').innerText = "수정 완료";
        document.getElementById('cancel-btn').style.display = "block";
        switchTab('expense-add', document.getElementById('btn-expense'));
    }

    function cancelEdit() {
        document.getElementById('edit-id').value = "";
        document.getElementById('exp-date').valueAsDate = new Date();
        document.getElementById('exp-note').value = "";
        document.getElementById('exp-amount').value = "";
        document.getElementById('form-title').innerText = "지출 기록";
        document.getElementById('save-btn').innerText = "지출 저장";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function deleteTransaction(id) {
        if(confirm('삭제할까요?')) {
            transactions = transactions.filter(t => t.id != id);
            localStorage.setItem('g_trans', JSON.stringify(transactions));
            refreshUI();
        }
    }

    function initCategorySelect() {
        document.getElementById('exp-category').innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function renderSettings() {
        const list = document.getElementById('category-list');
        list.innerHTML = categories.map(c => `
            <div class="category-item">
                <span style="flex:1">${c.name}</span>
                <input type="text" value="${Number(c.budget).toLocaleString()}" inputmode="numeric" style="width:100px; padding:5px;" oninput="inputFormatting(this); updateCatBudget(${c.id}, this.value)">
                <button onclick="deleteCat(${c.id})" style="background:var(--danger-color); border:none; color:white; padding:5px; border-radius:4px; font-size:10px;">삭제</button>
            </div>
        `).join('');
    }

    function updateCatBudget(id, val) {
        const cat = categories.find(c => c.id === id);
        if(cat) cat.budget = parseFormatted(val);
    }

    function addCategory() {
        const name = document.getElementById('new-cat-name').value;
        if(!name) return;
        categories.push({ id: Date.now(), name, budget: 0 });
        document.getElementById('new-cat-name').value = '';
        renderSettings();
    }

    function deleteCat(id) {
        if(confirm('항목을 삭제하시겠습니까?')) {
            categories = categories.filter(c => c.id !== id);
            renderSettings();
        }
    }

    function saveCategories() {
        localStorage.setItem('g_cats', JSON.stringify(categories));
        alert('설정 저장 완료');
        refreshUI();
    }

    function exportCSV(mode) {
        let filtered = transactions;
        let filename = "가계부_전체내역.csv";
        if(mode === 'current') {
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const monthStr = `${year}-${month}`;
            filtered = transactions.filter(t => t.date.startsWith(monthStr));
            filename = `가계부_${monthStr}.csv`;
        }
        if(filtered.length === 0) return alert('데이터가 없습니다.');
        let csv = "\uFEFF날짜,항목,내용,금액\n";
        filtered.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(t => {
            const cat = categories.find(c => c.id === t.catId);
            csv += `${t.date},${cat ? cat.name : '미지정'},${t.note.replace(/,/g, '')},${t.amount}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
    }

    function importCSV(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split('\n');
            let addedCount = 0;
            for(let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if(!line) continue;
                const parts = line.split(',');
                if(parts.length < 4) continue;
                const date = parts[0];
                const catName = parts[1];
                const note = parts[2];
                const amount = parseInt(parts[3]);
                if(!date || isNaN(amount)) continue;
                let cat = categories.find(c => c.name === catName);
                if(!cat && catName !== '미지정') {
                    const newId = Date.now() + Math.floor(Math.random() * 1000);
                    cat = { id: newId, name: catName, budget: 0 };
                    categories.push(cat);
                }
                transactions.push({ id: Date.now() + Math.floor(Math.random() * 100000), date, note, amount, catId: cat ? cat.id : null });
                addedCount++;
            }
            if(addedCount > 0) {
                localStorage.setItem('g_trans', JSON.stringify(transactions));
                localStorage.setItem('g_cats', JSON.stringify(categories));
                alert(addedCount + '개의 내역을 불러왔습니다.');
                refreshUI();
            }
            input.value = "";
        };
        reader.readAsText(file);
    }

    // 초기 실행
    window.onload = function() {
        document.getElementById('exp-date').valueAsDate = new Date();
        refreshUI();
    }
</script>

</body>
</html>
